  # proxy_set_header Authorization "Basic ${egress_basic_auth}";
  # proxy_set_header Host "tile.openstreetmap.org";
  # set $egress_host_and_port '{{env "EGRESS_HOST_AND_PORT"}}';
  # # proxy_pass https://${egress_host_and_port}${request_uri};
  # # proxy_pass https://proxy-gsa-datagov-development-datagov-catalog-proxy.apps.internal:61443/$1/$2/$3.png;
  # proxy_pass {{env "proxy_url"}}/$1/$2/$3.png;
}

# Don't leak any server information in response headers
server_tokens off;
