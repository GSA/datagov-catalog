name: Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PY_VERSION: "3.12"
  POETRY_VERSION: "latest"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Python Lint
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1

  deploy-staging:
    name: deploy to staging space
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Deploy via composite action
        uses: ./.github/actions/deploy
        with:
          cf_space: staging
          python-version: ${{ env.PY_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          cf_username: ${{ secrets.CF_SERVICE_USER }}
          cf_password: ${{ secrets.CF_SERVICE_AUTH }}
          smoke-url: https://catalog-stage.data.gov/
          smoke-path: /
          basic_auth_user: ${{ secrets.BASIC_AUTH_USER }}
          basic_auth_password: ${{ secrets.BASIC_AUTH_PASSWORD }}

  deploy-prod:
    name: deploy to prod space
    environment: prod
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Deploy via composite action
        uses: ./.github/actions/deploy
        with:
          cf_space: prod
          python-version: ${{ env.PY_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          cf_username: ${{ secrets.CF_SERVICE_USER }}
          cf_password: ${{ secrets.CF_SERVICE_AUTH }}
          smoke-url: https://catalog.data.gov/
          smoke-path: /
          # basic auth on prod is turned off

  lighthouse:
    name: Lighthouse CI Audit
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url="https://catalog.data.gov" \
            --collect.url="https://catalog.data.gov/organization" \
            --collect.url="https://catalog.data.gov/organization/gsa" \
            --collect.url="https://catalog.data.gov/dataset/gsa-enterprise-data-inventory-edi" \
            --collect.numberOfRuns=1 \
            --upload.target=filesystem \
            --upload.outputDir=./lighthouse-results

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: ./lighthouse-results
          retention-days: 7