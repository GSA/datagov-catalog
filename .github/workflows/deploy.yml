name: Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PY_VERSION: "3.12"
  POETRY_VERSION: "latest"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Python Lint
    steps:
      - uses: actions/checkout@v4
      - uses: chartboost/ruff-action@v1

  deploy-staging:
    name: deploy to staging space
    environment: staging
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Deploy via composite action
        uses: ./.github/actions/deploy
        with:
          cf_space: staging
          python-version: ${{ env.PY_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          cf_username: ${{ secrets.CF_SERVICE_USER }}
          cf_password: ${{ secrets.CF_SERVICE_AUTH }}
          smoke-url: https://catalog-stage.data.gov/
          smoke-path: /
          basic_auth_user: ${{ secrets.BASIC_AUTH_USER }}
          basic_auth_password: ${{ secrets.BASIC_AUTH_PASSWORD }}

  deploy-prod:
    name: deploy to prod space
    environment: prod
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Deploy via composite action
        uses: ./.github/actions/deploy
        with:
          cf_space: prod
          python-version: ${{ env.PY_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          cf_username: ${{ secrets.CF_SERVICE_USER }}
          cf_password: ${{ secrets.CF_SERVICE_AUTH }}
          smoke-url: https://catalog.data.gov/
          smoke-path: /
          # basic auth on prod is turned off

  lighthouse:
    name: Lighthouse CI Audit
    needs: deploy-prod
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Collect Lighthouse results
        run: |
          lhci collect \
            --url="https://catalog.data.gov" \
            --url="https://catalog.data.gov/organization" \
            --url="https://catalog.data.gov/organization/gsa" \
            --url="https://catalog.data.gov/dataset/gsa-enterprise-data-inventory-edi" \
            --numberOfRuns=1

      - name: Upload to filesystem
        run: |
          lhci upload \
            --target=filesystem \
            --outputDir=./lighthouse-results

      - name: Assert thresholds
        run: |
          output=$(lhci assert --config=lighthouserc.yml 2>&1) || {
            echo "$output" | while IFS= read -r line; do
              [[ -n "$line" ]] && echo "::error::$line"
            done
            exit 1
          }

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: ./lighthouse-results/**/*.html
          retention-days: 7