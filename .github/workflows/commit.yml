name: Commit
on: [push]

permissions:
    contents: read

env:
  PY_VERSION: "3.12"
  POETRY_VERSION: "latest"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Python lint
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: ${{ env.POETRY_VERSION }}
          poetry-plugins: "poetry-plugin-export"

      - name: Install Dependencies
        run: |
          poetry env use ${{ env.PY_VERSION }}
          poetry install

      - name: Run linting
        run: make lint-check

  test:
    environment: development
    runs-on: ubuntu-latest
    name: Pytests
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: ${{ env.POETRY_VERSION }}
          poetry-plugins: "poetry-plugin-export"

      - name: Install Dependencies
        run: |
          poetry env use ${{ env.PY_VERSION }}
          poetry install

      - name: Run Pytest
        run: make test-ci

  accessibility:
    runs-on: ubuntu-latest
    name: Accessibility Tests
    continue-on-error: true
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: ${{ env.POETRY_VERSION }}
          poetry-plugins: "poetry-plugin-export"

      - name: Install Python Dependencies
        run: |
          poetry env use ${{ env.PY_VERSION }}
          poetry install

      - name: Install Node Dependencies
        run: npm install

      - name: Start Docker Services
        run: make up

      - name: Wait for services to be ready
        run: sleep 10

      - name: Load test data
        run: make load-test-data

      - name: Run accessibility tests
        run: make test-pa11y

      - name: Tear down services
        if: always()
        run: make down

  lighthouse:
    runs-on: ubuntu-latest
    name: Lighthouse CI Audit
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Collect Lighthouse results
        run: |
          lhci collect \
            --url="https://catalog.data.gov" \
            --url="https://catalog.data.gov/organization" \
            --url="https://catalog.data.gov/organization/gsa" \
            --url="https://catalog.data.gov/dataset/gsa-enterprise-data-inventory-edi" \
            --numberOfRuns=1

      - name: Upload to filesystem
        run: |
          lhci upload \
            --target=filesystem \
            --outputDir=./lighthouse-results

      - name: Assert thresholds
        run: |
          output=$(lhci assert --config=lighthouserc.yml 2>&1) || {
            echo "$output" | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          }

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: ./lighthouse-results/**/*.html
          retention-days: 30

  deploy-development:
    name: deploy to development space
    if: github.ref == 'refs/heads/develop'
    environment: development
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Deploy via composite action
        uses: ./.github/actions/deploy
        with:
          cf_space: development
          python-version: ${{ env.PY_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}
          cf_username: ${{ secrets.CF_SERVICE_USER }}
          cf_password: ${{ secrets.CF_SERVICE_AUTH }}
          smoke-url: https://catalog-dev.data.gov/
          smoke-path: /
          basic_auth_user: ${{ secrets.BASIC_AUTH_USER }}
          basic_auth_password: ${{ secrets.BASIC_AUTH_PASSWORD }}