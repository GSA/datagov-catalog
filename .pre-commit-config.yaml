# Runs the same linters/formatters as `make lint-check` before each commit.
# One-time setup per clone:  pip install pre-commit && pre-commit install
# Tool versions are kept in sync with the pins in poetry.lock / pyproject.toml.
repos:
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
