{% macro render_filter_accordion_section(section_id, title, is_active=false, active_summary=none, subtitle=none, extra_classes='', button_id=none) %}
<div
    class="usa-accordion usa-accordion--bordered filter-accordion {{ extra_classes }}"
    data-filter-section="{{ section_id }}"
    data-filter-active="{{ 'true' if is_active else 'false' }}"
>
    <h3 class="usa-accordion__heading">
        <button
            type="button"
            class="usa-accordion__button{% if is_active %} filter-accordion__button--active{% endif %}"
            aria-expanded="true"
            aria-controls="{{ section_id }}"
            {% if button_id %}id="{{ button_id }}"{% endif %}
            {% if is_active and active_summary %}
            aria-label="{{ title }}: {{ active_summary }}"
            {% endif %}
        >
            <span class="filter-accordion__heading-text">
                <span class="filter-accordion__title">{{ title }}</span>
                {% if is_active and active_summary %}
                <span class="filter-accordion__secondary">
                    <span class="filter-accordion__active-indicator" aria-hidden="true">{{ active_summary }}</span>
                </span>
                {% elif subtitle %}
                <span class="filter-accordion__secondary">
                    <span class="filter-accordion__subtitle">{{ subtitle }}</span>
                </span>
                {% endif %}
            </span>
        </button>
    </h3>
    <div id="{{ section_id }}" class="usa-accordion__content usa-prose">
        {{ caller() }}
    </div>
</div>
{% endmacro %}
