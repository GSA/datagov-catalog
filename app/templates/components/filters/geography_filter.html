{% macro render_geography_filter(search_result_geometries=None) %}
<div class="keyword-autocomplete">
    <label id="geography-input-label" class="usa-label margin-top-0" for="geography-input">
      Filter by Geography <br>
        <span class="usa-hint">Start typing to see suggestions or use the pencil button to open a larger map</span>
    </label>
    <input
        type="text"
        id="geography-input"
        class="keyword-autocomplete__input usa-input"
        placeholder="Type a place..."
        autocomplete="off"
        aria-autocomplete="list"
        aria-controls="geography-suggestions"
        aria-expanded="false"
    >
    <div id="geography-suggestions" class="keyword-suggestions" role="listbox"></div>
</div>
<div id="geography-map"></div>
<script id="geography-search-result-geometries" type="application/json">{{ (search_result_geometries or []) | tojson }}</script>
{% endmacro %}
